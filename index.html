<!DOCTYPE html>
<html>
  <head>
    <title>My Tableau Page</title>
    <script src="https://public.tableau.com/javascripts/api/tableau-2.min.js"></script>
    <style>
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f7f6;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center; /* Centers everything horizontally */
        padding: 40px;
      }

      button {
        margin: 5px;
        padding: 10px 15px;
        cursor: pointer;
        border-radius: 4px;
        border: 1px solid #ccc;
        background-color: white;
        width: 160px;
      }

      button:hover {
        background-color: #f0f0f0;
      }
     .btn-brand.active {
          background-color: #7a5570;
          color: white;
          opacity: 1;
      }
      
      /* Hidden state (Excluded) */
      .btn-brand.inactive {
          background-color: #e0e0e0;
          color: #888;
          text-decoration: line-through;
          opacity: 0.6;
      }
          
      /* Green style for Exports */
      .btn-export {
          background-color: #00747c;
          color: white;
      }
      .btn-export:hover {
          background-color: #004449;
      }
    
            
      .main-wrapper {
          width: 100%;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
      }
      h1 {
          color: #333;
          margin-bottom: 30px;
      }

      
     .controls-container {
          background: white;
          padding: 25px;
          border-radius: 12px;
          box-shadow: 0 4px 15px rgba(0,0,0,0.05);
          width: 1600px;
          display: flex;
          flex-direction: raw;
          align-items: center;
          gap: 20px; /* Space between rows */
          margin-bottom: 30px;
      }
      
      .action-group, .brand-filters {
          display: flex;
          flex-wrap: wrap;
          justify-content: center;
          align-items: center;
          gap: 10px;
      }
      
      /* Styling the Input area */
      .input-group {
          display: flex;
          align-items: center;
          background: #eee;
          padding: 5px 10px;
          border-radius: 6px;
          margin-left: 15px;
      }
      
      #yearInput {
          width: 60px;
          border: 1px solid #ccc;
          border-radius: 4px;
          padding: 5px;
          margin: 0 8px;
      }
      
      /* Dashboard Container */
      #vizContainer {
          width: 1600px; 
          height: 900px;
          overflow: hidden;
          margin: 20px;
          box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      }
    </style>
  </head>
  <body>
    <div class="main-wrapper">
        <h1> My first Tableau dashboard</h1>
        <div class="controls-container"> 
            <div class="input-group">
                <label for="yearInput">Enter Year:</label>
                <input type="number" id="yearInput" value="2020" placeholder="e.g. 2015">
                <p id="error-msg" style="color: red; display: none; font-size: 14px;">
                    Error: Please enter a year between 2000 and 2020.
                </p>
            </div>
            <div flex-direction: column>  
            <p>Click to Hide/Show Brands:</p>
            <div class="brand-filters" id="brand-filters">
                
                <button class="btn-brand active" onclick="toggleBrand(this, 'BMW')">BMW</button>
                <button class="btn-brand active" onclick="toggleBrand(this, 'Mercedes-Benz')">Mercedes</button>
                <button class="btn-brand active" onclick="toggleBrand(this, 'Audi')">Audi</button>
                <button class="btn-brand active" onclick="toggleBrand(this, 'Porsche')">Porsche</button>
                <button class="btn-brand active" onclick="toggleBrand(this, 'VW')">Volkswagen</button>
            </div>
            </div>

            <button class="btn-export" onclick="exportPDF()">Export PDF</button>
            <button class="btn-export" onclick="resetViz()">Reset Dashboard</button>
        </div>
        <div id="vizContainer"></div>
    </div>
    <script src="my-page.js"></script>
  </body>
</html>
