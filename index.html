<!DOCTYPE html>
<html>
  <head>
    <title>My Tableau Page</title>
    <script src="https://public.tableau.com/javascripts/api/tableau-2.min.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }

      
      button {
        margin: 5px;
        padding: 10px 15px;
        cursor: pointer;
        border-radius: 4px;
        border: 1px solid #ccc;
        background-color: white;
      }
      .btn-parameter {
        background-color: #2e75b6;
        color: white;
      }
      .btn-parameter:hover {
        background-color: #1f4e79;
      }
      .btn-export {
        background-color: #548235;
        color: white;
      }
      .btn-export:hover {
        background-color: #375623;
      }
    
      .btn-brand.active {
        background-color: #2e75b6;
        color: white;
        opacity: 1;
      }

      .btn-brand.inactive {
        background-color: #e0e0e0;
        color: #888;
        text-decoration: line-through;
        opacity: 0.6;
      }

      #vizContainer {
        margin-top: 30px; /* This creates the space you wanted */
        border: 1px solid #eee;
      }

      .export-controls {
        margin-top: 15px;
        padding-top: 10px;
        border-top: 1px dashed #ccc;
      }
    </style>
  </head>
  <body>
    <h1> My first Tableau dashboard</h1>
    <div class="input-group">
      <label for="yearInput">Enter Year:</label>
      <input type="number" id="yearInput" value="2020" placeholder="e.g. 2015">
      // <button class="btn-filter" onclick="handleYearInput()">Apply Year</button>
      <p id="error-msg" style="color: red; display: none; font-size: 14px;">
          Error: Please enter a year between 2000 and 2020.
      </p>
    </div>
    <button class="btn-parameter" onclick="changeYear('2019')">Show 2019</button>
    <button class="btn-parameter" onclick="changeYear('2018')">Show 2018</button>
    <button class="btn-export" onclick="exportPDF()">Export PDF</button>
    <button class="btn-export" onclick="resetViz()">Reset Dashboard</button>
    <div id="brand-filters">
      <p>Click to Hide/Show Brands:</p>
      <button class="btn-brand active" onclick="toggleBrand(this, 'BMW')">BMW</button>
      <button class="btn-brand active" onclick="toggleBrand(this, 'Mercedes-Benz')">Mercedes</button>
      <button class="btn-brand active" onclick="toggleBrand(this, 'Audi')">Audi</button>
      <button class="btn-brand active" onclick="toggleBrand(this, 'Porsche')">Porsche</button>
      <button class="btn-brand active" onclick="toggleBrand(this, 'VW')">Volkswagen</button>
    </div>
    <div id="vizContainer" style="width: 800px; height: 600px; margin-top: 50px;"></div>
    <script src="my-page.js"></script>
  </body>
</html>
